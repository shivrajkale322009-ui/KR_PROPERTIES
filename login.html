<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access | KR Properties</title>
    <link rel="stylesheet" href="index.css">
</head>

<body style="background: var(--gray-50); display: flex; align-items: center; justify-content: center; height: 100vh;">

    <div
        style="background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center;">
        <div style="display: inline-block; margin-bottom: 25px;">
            <span class="logo-text" style="color: var(--navy); font-size: 2rem;">KR Properties</span>
        </div>
        <h1 style="font-size: 1.5rem; margin-bottom: 10px;">Admin Login</h1>
        <p style="color: var(--gray-600); margin-bottom: 30px; font-size: 0.9rem;">Secure access for KR Kale only.
        </p>

        <button id="google-login" class="btn-header"
            style="width: 100%; padding: 15px; background: #4285F4; border: none; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <svg width="20" height="20" fill="white" viewBox="0 0 24 24">
                <path
                    d="M12.48 10.92v3.28h7.84c-.24 1.84-2.43 5.56-7.84 5.56-4.68 0-8.48-3.88-8.48-8.68s3.8-8.68 8.48-8.68c2.68 0 4.48 1.12 5.52 2.12l2.6-2.6C18.48 1.08 15.6 0 12.48 0 5.6 0 0 5.6 0 12.48s5.6 12.48 12.48 12.48c7.2 0 12-5.08 12-12.2 0-.84-.08-1.48-.2-2.12h-11.8z" />
            </svg>
            Sign in with Google
        </button>

        <div style="margin-top: 30px; font-size: 0.8rem; color: var(--gray-600);">
            <p>Note: You will be automatically logged out after closing this tab.</p>
        </div>
    </div>

    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Redirect if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'index.html';
        });

        document.getElementById('google-login').addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
                // Redirect is handled by onAuthStateChanged
            } catch (error) {
                console.error("Login Error:", error);
                alert("Only authorized admins can log in.");
            }
        });
    </script>
</body>

</html>
